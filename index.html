<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>挪车二维码</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body, p, div, span, a, h1, h2, h3, button {
            font-family: "LXGW WenKai", "STKaiti SC", "STKaiti", "KaiTi", "楷体", serif !important;
            font-weight: 400;
        }

        .fas, .far, .fal {
            font-family: "Font Awesome 6 Free" !important;
            font-weight: 900 !important;
        }

        .fab {
            font-family: "Font Awesome 6 Brands" !important;
            font-weight: 400 !important;
        }

        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(145deg, #5b74e8 0%, #9057d8 50%, #e28ef0 100%);
            background-attachment: fixed;
        }

        /* 随机背景图案层 */
        .bg-pattern {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-pattern .blob {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            filter: blur(60px);
            animation: float 18s infinite ease-in-out;
        }

        .bg-pattern .geo {
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            filter: blur(40px);
            animation: drift 22s infinite ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.05); }
            100% { transform: translate(0, 0) scale(1); }
        }

        @keyframes drift {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-20px, 30px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        /* iOS26 主卡片液态玻璃 */
        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.32);
            border-radius: 36px;
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            box-shadow:
                0 10px 40px rgba(0, 0, 0, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
            padding: 52px 36px;
            text-align: center;
            max-width: 430px;
            width: 100%;
        }

        .title {
            color: #ffffff;
            font-size: 32px;
            margin-bottom: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.88);
            font-size: 17px;
            margin-bottom: 38px;
            line-height: 1.55;
        }

        /* 车牌外层毛玻璃容器 */
        .license-plate {
            position: relative;
            background: rgba(255, 255, 255, 0.10);
            border: 1px solid rgba(255, 255, 255, 0.38);
            border-radius: 22px;
            padding: 28px 16px;
            margin: 36px 0;
            backdrop-filter: blur(20px) saturate(170%);
            -webkit-backdrop-filter: blur(20px) saturate(170%);
            box-shadow:
                0 0 30px rgba(255, 255, 255, 0.08),
                0 8px 28px rgba(0, 0, 0, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.28);
        }
        /* 真实蓝色车牌底板 */
        .plate-inner {
            display: inline-block;
            background: #0054b8;
            padding: 10px 24px;
            border-radius: 6px;
        }
        /* 车牌白色文字 */
        .plate-text {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 6px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 38px;
        }

        /* iOS26 按钮液态玻璃 */
        .btn {
            position: relative;
            padding: 17px 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 999px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
            text-decoration: none;
            display: inline-block;
            min-width: 230px;
            letter-spacing: 0.6px;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px) saturate(170%);
            -webkit-backdrop-filter: blur(18px) saturate(170%);
            box-shadow:
                0 6px 22px rgba(0, 0, 0, 0.18),
                inset 0 1px 0 rgba(255, 255, 255, 0.22);
        }
        .btn:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.55);
            background: rgba(255, 255, 255, 0.16);
            box-shadow:
                0 12px 36px rgba(0, 0, 0, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.35);
        }
        .btn-wechat {
            border-color: rgba(12, 210, 104, 0.35);
        }
        .btn-wechat:hover {
            background: rgba(12, 210, 104, 0.22);
        }
        .btn-call {
            border-color: rgba(46, 184, 78, 0.35);
        }
        .btn-call:hover {
            background: rgba(46, 184, 78, 0.22);
        }
        .btn-sms {
            border-color: rgba(28, 176, 200, 0.35);
        }
        .btn-sms:hover {
            background: rgba(28, 176, 200, 0.22);
        }

        .icon {
            margin-right: 10px;
            font-size: 20px;
        }

        .footer {
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.76);
            font-size: 15px;
        }

        /* 版权区域玻璃分割 */
        .copyright {
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.68);
            font-size: 13px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            line-height: 1.6;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .copyright a {
            color: #ffffff;
            text-decoration: none;
            transition: 0.25s;
        }
        .copyright a:hover {
            text-decoration: underline;
            color: rgba(255, 255, 255, 0.96);
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            html { font-size: 14px; }
            .container { padding: 40px 24px; border-radius: 30px; }
            .title { font-size: 28px; }
            .plate-text { font-size: 26px; letter-spacing: 4px; }
            .license-plate { padding: 22px 12px; border-radius: 18px; }
            .btn { padding: 15px 20px; width: 100%; min-width: unset; font-size: 16px; }
            .copyright { font-size: 12px; }
        }
    </style>
</head>
<body>
    <!-- 随机背景图案层 -->
    <div class="bg-pattern" id="bgPattern"></div>

    <div class="container">
        <h1 class="title">🚗 挪车二维码</h1>
        <p class="subtitle">如有占用车位，请联系车主及时挪车</p>

        <!-- 修改车牌结构，内置蓝色底板 -->
        <div class="license-plate" id="licensePlate">
            <div class="plate-inner">
                <span class="plate-text" id="plateText">川G B9480</span>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-wechat" id="wechatBtn">
                <span class="icon">💬</span>
                微信联系车主
            </button>
            <a href="tel:15102801811" class="btn btn-call">
                <span class="icon">📞</span>
                一键拨打电话
            </a>
            <a href="sms:15102801811" class="btn btn-sms">
                <span class="icon">✉️</span>
                一键发送短信
            </a>
        </div>

        <div class="footer">
            <p>文明停车，互相体谅，方便你我</p>
        </div>

        <div class="copyright">
            <p>© 2026 <a href="http://ybkej.cn/" target="_blank">炎冰网络科技工作室</a> 版权所有</p>
        </div>
    </div>

    <script>
        // 随机背景渐变方案
        const gradients = [
            "linear-gradient(145deg, #5b74e8 0%, #9057d8 50%, #e28ef0 100%)",
            "linear-gradient(145deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%)",
            "linear-gradient(145deg, #a8edea 0%, #fed6e3 50%, #ffffff 100%)",
            "linear-gradient(145deg, #667eea 0%, #764ba2 50%, #f093fb 100%)",
            "linear-gradient(145deg, #4facfe 0%, #00f2fe 50%, #00c6fb 100%)",
            "linear-gradient(145deg, #43e97b 0%, #38f9d7 50%, #a8ff78 100%)",
            "linear-gradient(145deg, #fa709a 0%, #fee140 50%, #ff9a9e 100%)",
            "linear-gradient(145deg, #30cfd0 0%, #330867 50%, #a8ff78 100%)"
        ];
        const blobColors = [
            "rgba(255, 255, 255, 0.12)",
            "rgba(255, 255, 255, 0.18)",
            "rgba(255, 255, 255, 0.08)",
            "rgba(255, 255, 255, 0.22)"
        ];
        function random(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }
        function setRandomBackground() {
            const gradient = gradients[random(0, gradients.length - 1)];
            document.body.style.background = gradient;
            const patternLayer = document.getElementById("bgPattern");
            patternLayer.innerHTML = "";
            const blobCount = random(3, 5);
            for (let i = 0; i < blobCount; i++) {
                const blob = document.createElement("div");
                blob.className = "blob";
                const size = random(180, 360);
                blob.style.width = size + "px";
                blob.style.height = size + "px";
                blob.style.left = random(-100, window.innerWidth - size) + "px";
                blob.style.top = random(-100, window.innerHeight - size) + "px";
                blob.style.background = blobColors[random(0, blobColors.length - 1)];
                blob.style.animationDelay = random(0, 10) + "s";
                patternLayer.appendChild(blob);
            }
            const geoCount = random(2, 4);
            for (let i = 0; i < geoCount; i++) {
                const geo = document.createElement("div");
                geo.className = "geo";
                const size = random(60, 100);
                geo.style.width = size + "px";
                geo.style.height = size + "px";
                geo.style.left = random(20, window.innerWidth - size - 20) + "px";
                geo.style.top = random(20, window.innerHeight - size - 20) + "px";
                geo.style.animationDelay = random(0, 12) + "s";
                patternLayer.appendChild(geo);
            }
        }

        // 微信通知车主函数
        function notifyOwner() {
            fetch("https://wxpusher.zjiecode.com/api/send/message", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    appToken: "AT_Y3IJbp60ItoiwcteCMxg4kUnw7TTZR2h",
                    content: "您好，有人需要您挪车，请及时处理。",
                    contentType: 2,
                    uids: ["UID_5YMOAtgYAGflT28tMh2ZwW4qC9tu","UID_TPbAecguSWQTx0crpqEZahKSVoqf",]
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 1000) {
                    alert("通知已发送！车主将通过微信收到提醒");
                } else {
                    alert("通知发送失败，请稍后重试。");
                }
            })
            .catch(error => {
                console.error("Error sending notification:", error);
                alert("通知发送出错，请检查网络连接。");
            });
        }

        // 获取URL参数车牌、电话
        function getUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            const plate = urlParams.get('plate') || '川G B9480';
            const phone = urlParams.get('phone') || '15102801811';
            return { plate, phone };
        }

        // 动态更新车牌文字（适配url参数）
        function updateContent() {
            const { plate, phone } = getUrlParams();
            document.getElementById('plateText').textContent = plate;
            const callBtn = document.querySelector('.btn-call');
            const smsBtn = document.querySelector('.btn-sms');
            callBtn.href = `tel:${phone}`;
            smsBtn.href = `sms:${phone}`;
        }

        function trackClick(action) {
            console.log(`用户点击了: ${action}`);
        }

        document.addEventListener('DOMContentLoaded', function() {
            setRandomBackground();
            updateContent();
            document.getElementById('wechatBtn').addEventListener('click', function() {
                trackClick('微信联系');
                notifyOwner();
            });
            document.querySelector('.btn-call').addEventListener('click', function() {
                trackClick('拨打电话');
            });
            document.querySelector('.btn-sms').addEventListener('click', function() {
                trackClick('发送短信');
            });
        });

        // 快捷键支持
        document.addEventListener('keydown', function(e) {
            if (e.key === '0') document.getElementById('wechatBtn').click();
            else if (e.key === '1') document.querySelector('.btn-call').click();
            else if (e.key === '2') document.querySelector('.btn-sms').click();
        });
    </script>
</body>
</html>
