<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>挪车二维码</title>
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 霞鹜文楷免费商用楷体字体 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }
        /* 全局所有文字强制霞鹜文楷 */
        body, p, div, span, li, a, h1, h2, h3, h4, h5, h6, input, textarea, button {
            font-family: "LXGW WenKai", "STKaiti SC", "STKaiti", "KaiTi", "楷体", serif !important;
            font-weight: 400;
        }
        /* 保护图标字体，避免楷体覆盖图标 */
        .fas, .far, .fal {
            font-family: "Font Awesome 6 Free" !important;
            font-weight: 900 !important;
        }
        .fab {
            font-family: "Font Awesome 6 Brands" !important;
            font-weight: 400 !important;
        }
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(145deg, #5b74e8 0%, #9057d8 50%, #e28ef0 100%);
            background-attachment: fixed;
        }

        /* 随机背景漂浮光斑图案层 */
        .bg-pattern {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .bg-pattern .blob {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            filter: blur(60px);
            animation: float 18s infinite ease-in-out;
        }
        .bg-pattern .geo {
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            filter: blur(40px);
            animation: drift 22s infinite ease-in-out;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.05); }
            100% { transform: translate(0, 0) scale(1); }
        }
        @keyframes drift {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-20px, 30px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        /* iOS26 主卡片液态毛玻璃容器 */
        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 36px;
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            box-shadow:
                0 10px 40px rgba(0, 0, 0, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
            padding: 52px 36px;
            text-align: center;
            max-width: 430px;
            width: 100%;
        }
        .title {
            color: #111111;
            font-size: 32px;
            margin-bottom: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: none;
        }
        .subtitle {
            color: #333333;
            font-size: 17px;
            margin-bottom: 38px;
            line-height: 1.55;
        }

        /* 车牌外层毛玻璃容器 */
        .license-plate {
            position: relative;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 22px;
            padding: 28px 16px;
            margin: 36px 0;
            backdrop-filter: blur(20px) saturate(170%);
            -webkit-backdrop-filter: blur(20px) saturate(170%);
            box-shadow:
                0 0 30px rgba(255, 255, 255, 0.08),
                0 8px 28px rgba(0, 0, 0, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }
        /* 真实蓝色机动车车牌底板 */
        .plate-inner {
            display: inline-block;
            background: #0054b8;
            padding: 10px 24px;
            border-radius: 6px;
        }
        /* 车牌唯一白色文字 */
        .plate-text {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 6px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 38px;
        }
        /* iOS26 按钮液态玻璃 黑色文字 */
        .btn {
            position: relative;
            padding: 17px 30px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 999px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
            text-decoration: none;
            display: inline-block;
            min-width: 230px;
            letter-spacing: 0.6px;
            color: #111111;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(18px) saturate(170%);
            -webkit-backdrop-filter: blur(18px) saturate(170%);
            box-shadow:
                0 6px 22px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }
        .btn:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.85);
            box-shadow:
                0 12px 36px rgba(0, 0, 0, 0.18),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }
        .btn-wechat {
            border-color: rgba(12, 210, 104, 0.45);
        }
        .btn-wechat:hover {
            background: rgba(12, 210, 104, 0.15);
        }
        .btn-call {
            border-color: rgba(46, 184, 78, 0.45);
        }
        .btn-call:hover {
            background: rgba(46, 184, 78, 0.15);
        }
        .btn-sms {
            border-color: rgba(28, 176, 200, 0.45);
        }
        .btn-sms:hover {
            background: rgba(28, 176, 200, 0.15);
        }
        .icon {
            margin-right: 10px;
            font-size: 20px;
        }

        .footer {
            margin-top: 40px;
            color: #555555;
            font-size: 15px;
        }

        /* 备案版权区域玻璃分割 */
        .copyright-wrap {
            margin-top: 24px;
            color: #666666;
            font-size: 13px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            line-height: 1.6;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .copyright-item {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 8px 0;
            gap: 10px;
        }
        .copyright-item img {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
        }
        .copyright-item a {
            color: #111111;
            text-decoration: none;
            transition: 0.25s;
        }
        .copyright-item a:hover {
            text-decoration: underline;
            color: #0054b8;
        }

        /* 自定义弹窗遮罩层 */
        .modal-mask {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-mask.show {
            opacity: 1;
            visibility: visible;
        }
        /* iOS26毛玻璃弹窗盒子 */
        .modal-box {
            width: 320px;
            background: rgba(255, 255, 255, 0.32);
            backdrop-filter: blur(26px) saturate(180%);
            -webkit-backdrop-filter: blur(26px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 28px;
            padding: 36px 28px;
            text-align: center;
            box-shadow:
                0 14px 45px rgba(0, 0, 0, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.35);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.2,0.8,0.2,1);
        }
        .modal-mask.show .modal-box {
            transform: scale(1);
        }
        .modal-icon {
            font-size: 48px;
            color: #009944;
            margin-bottom: 16px;
        }
        .modal-text {
            font-size: 18px;
            color: #111;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .modal-btn {
            padding: 12px 36px;
            border-radius: 999px;
            border: 1px solid rgba(0, 84, 184, 0.4);
            background: rgba(0, 84, 184, 0.12);
            color: #111;
            font-size: 16px;
            cursor: pointer;
            transition: 0.25s;
        }
        .modal-btn:hover {
            background: rgba(0, 84, 184, 0.22);
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            html { font-size: 14px; }
            .container { padding: 40px 24px; border-radius: 30px; }
            .title { font-size: 28px; }
            .plate-text { font-size: 26px; letter-spacing: 4px; }
            .license-plate { padding: 22px 12px; border-radius: 18px; }
            .btn { padding: 15px 20px; width: 100%; min-width: unset; font-size: 16px; }
            .copyright-wrap { font-size: 12px; padding-top: 18px; }
            .copyright-item { gap: 6px; margin: 6px 0; }
            .copyright-item img { width: 26px; height: 26px; }
            .modal-box { width: 86%; padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <!-- 弹窗遮罩 -->
    <div class="modal-mask" id="modalMask">
        <div class="modal-box">
            <div class="modal-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <div class="modal-text" id="modalText">通知已发送！车主将通过微信收到提醒</div>
            <button class="modal-btn" id="modalCloseBtn">确定</button>
        </div>
    </div>

    <!-- 随机背景图案层 -->
    <div class="bg-pattern" id="bgPattern"></div>

    <div class="container">
        <h1 class="title">🚗 挪车二维码</h1>
        <p class="subtitle">如有占用车位，请联系车主及时挪车</p>

        <!-- 车牌区域 蓝底白字真实牌照样式 -->
        <div class="license-plate" id="licensePlate">
            <div class="plate-inner">
                <span class="plate-text" id="plateText">闽C 75WG6</span>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-wechat" id="wechatBtn">
                <span class="icon">💬</span>微信联系车主
            </button>
            <a href="tel:17850505107" class="btn btn-call">
                <span class="icon">📞</span>一键拨打电话
            </a>
            <a href="sms:17850505107" class="btn btn-sms">
                <span class="icon">✉️</span>一键发送短信
            </a>
        </div>

        <div class="footer">
            <p>请文明停车，方便他人</p>
        </div>

        <!-- 保留原三行备案版权图片布局 -->
        <div class="copyright-wrap">
            <div class="copyright-item">
                <img src="./logo.png" alt="版权图标" loading="lazy">
                <span>© <a href="https://ybkej.cn/" target="_blank" rel="noopener noreferrer">炎冰网络科技工作室</a>版权所有</span>
            </div>
            <div class="copyright-item">
                <img src="./gongan.png" alt="公安备案图标" loading="lazy">
                <span><a href="https://beian.mps.gov.cn/" target="_blank" rel="noopener noreferrer">闽公网安备35021202000533号</a></span>
            </div>
            <div class="copyright-item">
                <img src="./icp.png" alt="ICP备案图标" loading="lazy">
                <span><a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">闽ICP备2022006016号</a></span>
            </div>
        </div>
    </div>

    <script>
        // 弹窗控制函数
        const modalMask = document.getElementById('modalMask');
        const modalCloseBtn = document.getElementById('modalCloseBtn');
        function showModal(text) {
            document.getElementById('modalText').innerText = text;
            modalMask.classList.add('show');
            // 3秒自动关闭弹窗
            setTimeout(()=>{
                modalMask.classList.remove('show');
            },3000)
        }
        // 点击确定关闭弹窗
        modalCloseBtn.addEventListener('click',()=>{
            modalMask.classList.remove('show');
        })
        // 点击遮罩空白处关闭弹窗
        modalMask.addEventListener('click',(e)=>{
            if(e.target === modalMask) modalMask.classList.remove('show');
        })

        // 随机背景渐变配色库
        const gradients = [
            "linear-gradient(145deg, #5b74e8 0%, #9057d8 50%, #e28ef0 100%)",
            "linear-gradient(145deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%)",
            "linear-gradient(145deg, #a8edea 0%, #fed6e3 50%, #ffffff 100%)",
            "linear-gradient(145deg, #667eea 0%, #764ba2 50%, #f093fb 100%)",
            "linear-gradient(145deg, #4facfe 0%, #00f2fe 50%, #00c6fb 100%)",
            "linear-gradient(145deg, #43e97b 0%, #38f9d7 50%, #a8ff78 100%)",
            "linear-gradient(145deg, #fa709a 0%, #fee140 50%, #ff9a9e 100%)",
            "linear-gradient(145deg, #30cfd0 0%, #330867 50%, #a8ff78 100%)"
        ];
        const blobColors = [
            "rgba(255, 255, 255, 0.12)",
            "rgba(255, 255, 255, 0.18)",
            "rgba(255, 255, 255, 0.08)",
            "rgba(255, 255, 255, 0.22)"
        ];
        function random(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }
        // 生成随机背景光斑与渐变
        function setRandomBackground() {
            const gradient = gradients[random(0, gradients.length - 1)];
            document.body.style.background = gradient;
            const patternLayer = document.getElementById("bgPattern");
            patternLayer.innerHTML = "";
            // 生成大模糊光斑
            const blobCount = random(3, 5);
            for (let i = 0; i < blobCount; i++) {
                const blob = document.createElement("div");
                blob.className = "blob";
                const size = random(180, 360);
                blob.style.width = size + "px";
                blob.style.height = size + "px";
                blob.style.left = random(-100, window.innerWidth - size) + "px";
                blob.style.top = random(-100, window.innerHeight - size) + "px";
                blob.style.background = blobColors[random(0, blobColors.length - 1)];
                blob.style.animationDelay = random(0, 10) + "s";
                patternLayer.appendChild(blob);
            }
            // 生成几何柔块
            const geoCount = random(2, 4);
            for (let i = 0; i < geoCount; i++) {
                const geo = document.createElement("div");
                geo.className = "geo";
                const size = random(60, 100);
                geo.style.width = size + "px";
                geo.style.height = size + "px";
                geo.style.left = random(20, window.innerWidth - size - 20) + "px";
                geo.style.top = random(20, window.innerHeight - size - 20) + "px";
                geo.style.animationDelay = random(0, 12) + "s";
                patternLayer.appendChild(geo);
            }
        }

        // 微信推送函数（替换原生alert为自定义毛玻璃弹窗）
        function notifyOwner() {
            fetch("https://wxpusher.zjiecode.com/api/send/message", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    appToken: "AT_ick7daOASrvZWSTUFB99tOBoXKzsuuR9",
                    content: "您好，有人需要您挪车，请及时处理。",
                    contentType: 1,
                    uids: ["UID_5YMOAtgYAGflT28tMh2ZwW4qC9tu",]
                })
            }).then(res=>res.json()).then(d=>{
                if(d.code===1000) showModal("通知已发送！车主将通过微信收到提醒");
                else showModal("通知发送失败，请稍后重试。");
            }).catch(e=>{
                console.error(e);
                showModal("通知发送出错，请检查网络连接。");
            });
        }

        // 设备判断切换纯色背景（覆盖随机渐变，访问页面后自动执行）
        function detectDevice(){
            const ua=navigator.userAgent;
            const ios=/iPhone|iPad|iPod/.test(ua);
            const android=/Android/.test(ua);
            if(android) document.body.style.background="linear-gradient(145deg, #4bbf50 0%, #2c7c31 50%, #7ed083 100%)";
            else if(ios) document.body.style.background="linear-gradient(145deg, #0077ff 0%, #0046cc 50%, #74b1ff 100%)";
        }

        // 获取URL参数车牌、手机号
        function getUrlParams(){
            const p=new URLSearchParams(window.location.search);
            return {
                plate:p.get("plate")||"闽C 75WG6",
                phone:p.get("phone")||"17850505107"
            };
        }

        // 动态更新车牌文字、电话链接
        function updateContent(){
            const {plate,phone}=getUrlParams();
            document.getElementById("plateText").textContent=plate;
            document.querySelector(".btn-call").href=`tel:${phone}`;
            document.querySelector(".btn-sms").href=`sms:${phone}`;
        }

        function trackClick(action){console.log(`点击：${action}`);}

        document.addEventListener("DOMContentLoaded",()=>{
            setRandomBackground();
            detectDevice();
            updateContent();
            document.getElementById("wechatBtn").addEventListener("click",()=>trackClick("微信联系")||notifyOwner());
            document.querySelector(".btn-call").addEventListener("click",()=>trackClick("拨打电话"));
            document.querySelector(".btn-sms").addEventListener("click",()=>trackClick("发送短信"));
        });

        // 数字快捷键
        document.addEventListener("keydown",e=>{
            if(e.key==="0") document.getElementById("wechatBtn").click();
            else if(e.key==="1") document.querySelector(".btn-call").click();
            else if(e.key==="2") document.querySelector(".btn-sms").click();
        });
    </script>
</body>
</html>
